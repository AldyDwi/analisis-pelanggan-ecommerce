name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3. Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 4. Build & Push Image ke Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/analisis-pelanggan-ecommerce:latest 

      - name: 5. Tembak Webhook ke VM Oracle
        run: |
          curl -X POST -H "Content-Type: application/json" \
               -H "X-Deploy-Token: ${{ secrets.WEBHOOK_SECRET }}" \
               ${{ secrets.WEBHOOK_URL }}